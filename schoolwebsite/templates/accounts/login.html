<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            width: 800px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .left {
            width: 40%;
            background: #2b2d42;
            color: white;
            padding: 40px 25px;
        }

        .left h2 {
            margin-bottom: 15px;
        }

        .left p {
            font-size: 14px;
            opacity: 0.8;
        }

        .right {
            width: 60%;
            padding: 40px 30px;
        }

        .right h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #2b2d42;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2b2d42;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1a1c2c;
        }

        .extra {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .extra a {
            color: #2b2d42;
            text-decoration: none;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Left Side -->
        <div class="left">
            <h2>School Portal</h2>
            <p>Login to access your dashboard, results, and academic resources.</p>
        </div>

        <!-- Right Side -->
        <div class="right">
            <h2>Login</h2>

            <form>
                <div class="form-group">
                    <label>Login as</label>
                    <select required>
                        <option value="">Select Role</option>
                        <option>Student</option>
                        <option>Teacher</option>
                        <option>Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email / Student ID</label>
                    <input type="text" placeholder="Enter your email or ID" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password" required>
                </div>

                <button class="login-btn">Login</button>
            </form>

            <div class="extra">
                <p><a href="#">Forgot Password?</a></p>
            </div>
        </div>

    </div>

</body>

</html>
