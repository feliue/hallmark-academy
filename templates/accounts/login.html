{% extends 'base.html' %}
{% block content %}

<div style="background: #f4f7fb; min-height: 85vh; display: flex; align-items: center; padding: 60px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div style="background: white; border-radius: 4px; border: 1px solid #dde4ed; overflow: hidden;">

                    <div style="background: #0a1628; padding: 38px; text-align: center;">
                        <h3 style="font-family: Playfair Display, serif; color: white; margin: 0; font-size: 22px;">
                            Hallmark Academy</h3>
                        <p style="color: #a8b8d0; margin-top: 8px; margin-bottom: 0; font-size: 13px;">Student Portal —
                            Secure Login</p>
                    </div>

                    <div style="padding: 40px;">
                        {% if error %}
                        <div
                            style="background: #fef2f2; border-left: 3px solid #dc2626; padding: 12px 15px; margin-bottom: 22px; border-radius: 2px;">
                            <p style="color: #dc2626; margin: 0; font-size: 13px;">{{ error }}</p>
                        </div>
                        {% endif %}

                        <form method="POST" action="/accounts/login/">
                            {% csrf_token %}
                            <div style="margin-bottom: 18px;">
                                <label
                                    style="font-weight: 600; color: #333; font-size: 13px; display: block; margin-bottom: 7px;">Username</label>
                                <input type="text" name="username" placeholder="Enter your username"
                                    style="width: 100%; padding: 12px 15px; border: 1px solid #c8d5e3; border-radius: 3px; font-size: 14px;">
                            </div>
                            <div style="margin-bottom: 24px;">
                                <label
                                    style="font-weight: 600; color: #333; font-size: 13px; display: block; margin-bottom: 7px;">Password</label>
                                <input type="password" name="password" placeholder="Enter your password"
                                    style="width: 100%; padding: 12px 15px; border: 1px solid #c8d5e3; border-radius: 3px; font-size: 14px;">
                            </div>
                            <button type="submit"
                                style="width: 100%; background: #0a1628; color: white; border: none; padding: 13px; border-radius: 3px; font-size: 15px; font-weight: 600; cursor: pointer;">Sign
                                In</button>
                        </form>

                        <p
                            style="text-align: center; color: #888; font-size: 12px; margin-top: 20px; line-height: 1.7;">
                            If you have forgotten your login details please contact the school office during working
                            hours.</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
