<div style="background:#f8f9fa; min-height:80vh; display:flex; align-items:center; padding:60px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div
                    style="background:white; border-radius:8px; box-shadow:0 4px 25px rgba(0,0,0,0.1); overflow:hidden;">

                    <div style="background:#1a3c5e; padding:35px; text-align:center;">
                        <h3 style="font-family:'Merriweather',serif; color:white; margin:0;">Al-Hikman University</h3>
                        <p style="color:#aab8c5; margin-top:8px; margin-bottom:0; font-size:14px;">Student Portal Login
                        </p>
                    </div>

                    <div style="padding:40px;">
                        <form method="POST">

                            <div style="margin-bottom:20px;">
                                <label
                                    style="font-weight:600; color:#333; font-size:14px; display:block; margin-bottom:6px;">Username</label>
                                <input type="text" name="username"
                                    style="width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:4px; font-size:14px;">
                            </div>
                            <div style="margin-bottom:20px;">
                                <label
                                    style="font-weight:600; color:#333; font-size:14px; display:block; margin-bottom:6px;">Password</label>
                                <input type="password" name="password"
                                    style="width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:4px; font-size:14px;">
                            </div>
                            <button type="submit"
                                style="width:100%; background:#1a3c5e; color:white; border:none; padding:13px; border-radius:4px; font-size:15px; font-weight:600; cursor:pointer;">Sign
                                In</button>
                        </form>
                        <p style="text-align:center; color:#888; font-size:13px; margin-top:20px;">If you have forgotten
                            your login details please contact the academic office.</p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
